services:
  app:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
